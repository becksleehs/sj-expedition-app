<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#101936">
  <title>학생 탐험본부 · 승주 원정대</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/app.css?v=210">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="icon-btn" href="index.html" aria-label="홈">⌂</a>
      <div><b>승주 원정대</b><small>학생 탐험본부</small></div>
      <button class="icon-btn" id="resetBtn" aria-label="학생 다시 선택">↻</button>
    </header>

    <main id="loginView" class="content">
      <section class="panel intro-panel">
        <span class="eyebrow">STEP 1</span>
        <h2>내 이름을 선택하세요</h2>
        <p>선택한 정보는 이 기기에 저장됩니다.</p>
        <div id="studentGrid" class="student-grid"></div>
      </section>
    </main>

    <main id="avatarView" class="content hidden">
      <section class="panel">
        <span class="eyebrow">STEP 2</span>
        <h2>탐험가를 선택하세요</h2>
        <p>캐릭터는 나중에 다시 바꿀 수 있습니다.</p>
        <div id="avatarGrid" class="avatar-grid"></div>
      </section>
    </main>

    <main id="dashboardView" class="content hidden">
      <section class="profile-card">
        <div class="profile-top">
          <div>
            <span class="chip" id="teamChip">미배정</span>
            <h2><span id="studentName"></span> 탐험가</h2>
            <p>오늘도 멋진 추억을 획득하세요!</p>
          </div>
          <button class="small-btn" id="changeAvatarBtn">캐릭터 변경</button>
        </div>

        <div class="hero-character-wrap">
          <div id="heroCharacter" class="hero-avatar-slot"></div>
          <div class="level-panel">
            <div class="level-row"><b id="levelText">Lv.1</b><span id="xpText">0 / 100 EXP</span></div>
            <div class="progress"><i id="xpBar"></i></div>
            <div class="equipment-row" id="equipmentRow"></div>
          </div>
        </div>
      </section>

      <section class="day-banner">
        <div><span>DAY 1 · 12:00–17:00</span><h3>🎢 부산 롯데월드 탐험</h3></div>
        <div class="day-progress"><strong id="missionPercent">0%</strong><small>달성률</small></div>
      </section>

      <section>
        <div class="section-head"><h3>오늘의 미션</h3><span id="missionCount">0 / 0 완료</span></div>
        <div id="missionList" class="mission-list"></div>
      </section>

      <section>
        <div class="section-head"><h3>획득 배지</h3><span>COLLECTION</span></div>
        <div id="badgeList" class="badge-list"></div>
      </section>

      <section>
        <div class="section-head"><h3>현재 랭킹</h3><span>LIVE</span></div>
        <div class="rank-card">
          <div><small>개인 점수</small><strong id="personalScore">0</strong><span>점</span></div>
          <div><small>소속 조</small><strong id="teamName">-</strong><span id="teamScore">0점</span></div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav hidden" id="bottomNav">
      <button class="active">🏠<span>탐험</span></button>
      <button onclick="document.querySelector('.mission-list').scrollIntoView({behavior:'smooth'})">🎯<span>미션</span></button>
      <button onclick="document.querySelector('.badge-list').scrollIntoView({behavior:'smooth'})">🎖️<span>배지</span></button>
      <button onclick="alert('사진첩 기능은 다음 업데이트에서 온라인 저장소와 연결됩니다.')">📸<span>사진</span></button>
    </nav>
  </div>
  <script src="js/data.js?v=210"></script>
  <script src="js/app.js?v=210"></script>
</body>
</html>
