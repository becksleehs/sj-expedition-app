<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#101936">
  <title>관리자 · 승주 원정대</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="admin-bg">
  <div class="admin-shell">
    <header class="admin-header">
      <div><span class="eyebrow">SJ EXPEDITION v1.1</span><h1>교사 관리자</h1></div>
      <div class="admin-actions"><button id="exportBtn" class="small-btn">백업 저장</button><a class="small-btn" href="index.html">사이트 보기</a></div>
    </header>

    <section class="admin-stats">
      <article><small>참석</small><strong id="attendanceCount">0</strong><span>/ 13명</span></article>
      <article><small>공개 미션</small><strong id="openMissionCount">0</strong><span>개</span></article>
      <article><small>총점</small><strong id="totalScore">0</strong><span>점</span></article>
    </section>

    <div class="admin-grid">
      <section class="admin-panel">
        <div class="section-head"><h2>출석 및 점수</h2><button id="selectAllBtn" class="small-btn">전체 참석</button></div>
        <div id="adminStudentList" class="admin-student-list"></div>
      </section>

      <section class="admin-panel">
        <div class="section-head"><h2>조 편성</h2><button id="makeTeamsBtn" class="btn btn-accent">자동 편성</button></div>
        <p class="help">참석 학생을 기준으로 3개 조에 균형 있게 배정합니다.</p>
        <div id="teamBoard" class="team-board"></div>
      </section>

      <section class="admin-panel">
        <div class="section-head"><h2>미션 관리</h2><span>공개/닫기</span></div>
        <div id="adminMissionList" class="admin-mission-list"></div>
      </section>

      <section class="admin-panel">
        <h2>공지와 설정</h2>
        <label>학생 공지<textarea id="noticeInput" rows="3" placeholder="예: 16시 30분까지 입구 광장으로 모이세요."></textarea></label>
        <button id="saveNoticeBtn" class="btn btn-primary">공지 저장</button>
        <hr>
        <label>새 관리자 비밀번호<input id="newPassword" type="password" placeholder="4자리 이상"></label>
        <button id="changePasswordBtn" class="small-btn">비밀번호 변경</button>
        <button id="resetDataBtn" class="danger-btn">모든 운영 데이터 초기화</button>
      </section>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
