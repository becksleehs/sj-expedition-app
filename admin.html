<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="css/app.css?v=17"><title>승주 원정대 관리자</title></head><body class="admin-body"><div class="admin-shell"><header class="admin-top"><h1>⚙️ 승주 원정대 관리자</h1><button id="logout" class="icon-btn">로그아웃</button></header><main class="admin-main"><div class="admin-grid"><section class="admin-card"><h2>미션 공개</h2><div class="field"><label>미션</label><select id="mission"><option value="경주월드 첫 원정|조원들과 첫 번째 현장 미션을 완료하세요.|20|hat">🎡 경주월드 → 탐험모자</option><option value="울릉도 길찾기|울릉도의 주요 장소를 확인하고 인증하세요.|30|compass">🏝️ 울릉도 → 나침반</option><option value="오늘의 베스트 사진|특별한 순간을 사진으로 남기세요.|20|camera">📸 사진 미션 → 카메라</option><option value="독도 태극기 미션|독도를 배경으로 인증 미션을 완료하세요.|30|badge">🇰🇷 독도 → 태극기 배지</option><option value="최종 원정 보고|3일간의 원정을 돌아보고 마지막 미션을 완료하세요.|40|telescope">⭐ 최종 → 황금 망원경</option></select></div><div id="missionState" class="field"></div><div class="actions"><button id="openMission">공개하기</button><button id="closeMission" class="danger">닫기</button></div></section><section class="admin-card"><h2>학생 공지</h2><div class="field"><textarea id="notice" rows="4" placeholder="학생 화면에 표시할 공지"></textarea></div><div class="actions"><button id="saveNotice">공지 저장</button><button id="toggleParty">원정대 공개/숨김</button></div></section><section class="admin-card full"><h2>참석자 확인</h2><div id="attendance" class="attendance"></div><div class="actions" style="margin-top:10px"><button id="saveAttendance">참석 저장</button><button id="makeTeams">자동 조편성</button></div></section><section class="admin-card full"><h2>조편성 결과</h2><div id="teams" class="team-output"></div></section><section class="admin-card full"><h2>개인 점수</h2><div id="ranks" class="rank-list"></div><div class="actions" style="margin-top:10px"><button id="saveRanks">점수 저장</button></div></section></div></main></div><script src="js/students.js"></script><script src="js/admin.js?v=17"></script></body></html>
